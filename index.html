<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FonoPRO</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html { font-size: 16px; }
body { background: #f5f2ec; color: #18120a; font-family: system-ui, sans-serif; }
.container { max-width: 700px; margin: 0 auto; padding: 15px; }
.top { background: #fffef9; border-bottom: 2px solid #18120a; padding: 15px; display: flex; gap: 10px; margin-bottom: 20px; border-radius: 8px; }
.brand { font-size: 1.2rem; font-weight: 700; margin-right: auto; }
.btn-tab { padding: 10px 15px; border: none; background: transparent; cursor: pointer; font-weight: 600; border-radius: 6px; min-height: 44px; font-family: inherit; font-size: .9rem; }
.btn-tab.active { background: #18120a; color: #fff; }
.panel { background: #fffef9; border: 2px solid #ddd; border-radius: 10px; padding: 20px; margin-bottom: 20px; display: none; }
.panel.active { display: block; }
h2 { font-size: 1.3rem; margin-bottom: 15px; }
label { display: block; font-weight: 700; margin: 15px 0 8px 0; }
select, input { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 6px; font-size: 1rem; font-family: inherit; margin-bottom: 10px; }
.btn { width: 100%; padding: 15px; border: none; border-radius: 8px; cursor: pointer; font-weight: 700; font-size: 1.1rem; font-family: inherit; min-height: 50px; }
.btn-main { background: #18120a; color: #fff; }
.btn-main:active { background: #0d0804; }
.btn-parar { background: #c0392b; color: #fff; }
.texto { background: #f5f2ec; padding: 15px; border-radius: 8px; min-height: 100px; line-height: 1.8; margin: 15px 0; border: 2px solid #ddd; }
.timer { font-family: monospace; font-size: 3.5rem; font-weight: 900; text-align: center; margin: 20px 0; }
.chips { background: #f5f2ec; padding: 15px; border-radius: 8px; min-height: 80px; display: flex; flex-wrap: wrap; gap: 10px; margin: 15px 0; border: 2px solid #ddd; }
.chip { background: #e8f7ea; border: 2px solid #2a7a38; color: #2a7a38; padding: 8px 12px; border-radius: 6px; font-weight: 600; font-size: .9rem; }
.resultado { background: #e8f7ea; border: 2px solid #2a7a38; padding: 20px; border-radius: 8px; text-align: center; margin-top: 20px; }
.resultado.bad { background: #fdecea; border-color: #c0392b; color: #c0392b; }
.info { background: #e8f2ff; border: 2px solid #0066bb; padding: 12px; border-radius: 6px; margin: 10px 0; font-size: .95rem; }
.form-group { margin-bottom: 15px; }
.form-line { display: flex; gap: 10px; align-items: center; margin-bottom: 12px; }
.form-line label { margin: 0; flex: 1; font-size: .95rem; }
.form-line input { flex: 2; margin: 0; }
#toast { position: fixed; bottom: 20px; right: 20px; background: #18120a; color: #fff; padding: 15px 20px; border-radius: 8px; font-weight: 700; z-index: 999; display: none; }
@media(max-width: 600px) { html { font-size: 14px; } .form-line { flex-direction: column; } .form-line input { flex: 1; } }
</style>
</head>

      <div id="stopForm"></div>

    </div>
    
    <div id="stopResultado" style="display: none;"></div>
  </div>

    <label>Dificuldade:</label>
    <select id="fluDif">
      <option value="1">🟢 Fácil</option>
      <option value="2" selected>🟡 Médio</option>
      <option value="3">🔴 Difícil</option>
      <option value="4">⚫ Extremo</option>
    </select>
    
    <label>Categoria:</label>
    <select id="fluCat">
      <option value="0">Animais</option>
      <option value="1">Frutas</option>
      <option value="2">Cores</option>
      <option value="3">Países</option>

    <button class="btn btn-main" id="fluBtn" onclick="iniciarFlu()">COMEÇAR</button>
    
    <div class="timer" id="fluTimer" style="display: none;">1:00</div>
    
    <div id="fluChips" class="chips"></div>
    
    <div id="fluResultado" style="display: none;"></div>
  </div>

  <!-- LEITURA -->
  <div class="panel" id="ler">
    <h2>📖 DESAFIO DE LEITURA</h2>

    <label>Nível:</label>

      <option value="3">🟠 3 - Médio</option>
      <option value="4">🔴 4 - Difícil</option>
      <option value="5">⚫ 5 - Extremo</option>
      <option value="6">🌪️ 6 - Ultra</option>
      <option value="7">💀 7 - Insano</option>
      <option value="8">🌀 8 - Caótico</option>
    </select>
    
    <div id="lerTexto" class="texto"></div>
    
    <button class="btn btn-main" id="lerBtn" onclick="iniciarLer()">COMEÇAR</button>
    
    <div id="lerStatus" class="info" style="display: none;">

    </div>
    
    <div id="lerResultado" style="display: none;"></div>
  </div>
</div>

// ===== FUNÇÕES GLOBAIS =====
function mudarAba(aba) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById(aba).classList.add('active');
  document.querySelectorAll('.btn-tab').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.display = 'block';
  setTimeout(() => { t.style.display = 'none'; }, 2500);
}

// ===== STOP =====
function iniciarStop() {
  const dif = document.getElementById('stopDif').value;
  const dados = STOP_DADOS[dif];
  const ltrs = 'ABCDEFGIJLMNOPQRSTUVXZ';
  const letra = ltrs[Math.floor(Math.random() * ltrs.length)];
  const tempo = parseInt(document.getElementById('stopTempo').value);
  
  let secs = tempo;
  
  document.getElementById('stopLetra').textContent = letra;
  document.getElementById('stopGame').style.display = '';
  document.getElementById('stopResultado').style.display = 'none';
  
  const form = document.getElementById('stopForm');
  form.innerHTML = '';
  dados.cats.forEach((cat, i) => {
    const line = document.createElement('div');
    line.className = 'form-line';
    line.innerHTML = `<label>${cat}:</label><input type="text" id="stopInp${i}" placeholder="Com ${letra}..." data-cat="${cat.toLowerCase()}">`;
    form.appendChild(line);
  });
  
  document.getElementById('stopInp0').focus();
  
  const timer = setInterval(() => {
    secs--;
    const m = Math.floor(secs / 60);
    const s = secs % 60;
    document.getElementById('stopTimer').textContent = m + ':' + (s < 10 ? '0' : '') + s;
    if (secs <= 0) {
      clearInterval(timer);
      finalizarStop();
    }
  }, 1000);
  
  window.stopTimer = timer;
}

function finalizarStop() {
  clearInterval(window.stopTimer);
  const dif = document.getElementById('stopDif').value;
  const dados = STOP_DADOS[dif];
  const letra = document.getElementById('stopLetra').textContent.toLowerCase();
  
  document.getElementById('stopGame').style.display = 'none';
  
  let pts = 0, html = '';
  const inputs = document.querySelectorAll('#stopForm input');
  inputs.forEach((inp, i) => {
    const cat = inp.getAttribute('data-cat');
    const val = inp.value.toLowerCase().trim();
    const ok = val.startsWith(letra) && dados.pals[cat] && dados.pals[cat].includes(val);
    pts += ok ? 10 : 0;
    html += `<div class="form-line" style="background: ${ok ? '#e8f7ea' : '#fdecea'}; padding: 10px; border-radius: 6px; border: 2px solid ${ok ? '#2a7a38' : '#c0392b'};">
      <span style="font-size: 1.3rem;">${ok ? '✅' : '❌'}</span>
      <strong style="flex: 1;">${cat.toUpperCase()}</strong>
      <span>${val || '(vazio)'}</span>
    </div>`;
  });
  
  const max = dados.cats.length * 10;
  const pct = Math.round((pts / max) * 100);
  
  document.getElementById('stopResultado').innerHTML = `
    <div class="resultado">
      <div style="font-size: 2rem; font-weight: 900;">${pts}/${max}</div>
      <div style="font-size: 1.5rem; margin: 10px 0;">${pct}%</div>
      <div style="margin: 15px 0;">${html}</div>
      <button class="btn btn-main" onclick="iniciarStop()" style="margin-top: 15px;">TENTAR NOVAMENTE</button>
    </div>
  `;
  document.getElementById('stopResultado').style.display = '';
  toast('✅ ' + pts + ' pontos!');
}

// ===== FLUÊNCIA =====
function iniciarFlu() {
  try {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) { toast('Navegador incompatível'); return; }
    
    const dif = document.getElementById('fluDif').value;
    const cat = parseInt(document.getElementById('fluCat').value);
    
    let secs = 60;
    let pals = [];
    
    document.getElementById('fluBtn').textContent = 'PARAR';
    document.getElementById('fluTimer').style.display = '';
    document.getElementById('fluChips').innerHTML = '';
    document.getElementById('fluResultado').style.display = 'none';
    
    const timer = setInterval(() => {
      secs--;
      document.getElementById('fluTimer').textContent = Math.floor(secs / 60) + ':' + (secs % 60 < 10 ? '0' : '') + (secs % 60);
      if (secs <= 0) {
        clearInterval(timer);
        finalizarFlu();
      }
    }, 1000);
    
    window.fluTimer = timer;
    
    const rec = new SR();
    rec.lang = 'pt-BR';
    rec.continuous = true;
    
    rec.onresult = (e) => {
      for (let i = e.resultIndex; i < e.results.length; i++) {
        if (e.results[i].isFinal) {
          const words = e.results[i][0].transcript.toLowerCase().split(/\s+/);
          words.forEach(w => {
            if (w.length > 2 && !pals.includes(w)) {
              pals.push(w);
              const chip = document.createElement('span');
              chip.className = 'chip';
              chip.textContent = '✓ ' + w;
              document.getElementById('fluChips').appendChild(chip);
            }
          });
        }
      }
    };
    
    rec.onend = () => { if (secs > 0) rec.start(); };
    
    window.fluRec = rec;
    rec.start();
    toast('Fale agora!');
  } catch (e) {
    toast('Erro: ' + e.message);
  }
}

function finalizarFlu() {
  if (window.fluRec) window.fluRec.stop();
  if (window.fluTimer) clearInterval(window.fluTimer);
  
  document.getElementById('fluBtn').textContent = 'COMEÇAR';
  document.getElementById('fluTimer').style.display = 'none';
  
  const total = document.querySelectorAll('#fluChips .chip').length;
  document.getElementById('fluResultado').innerHTML = `
    <div class="resultado">
      <div style="font-size: 2rem; font-weight: 900;">${total}</div>
      <div style="font-size: 1rem; margin-top: 10px;">PALAVRAS DIFERENTES</div>
      <button class="btn btn-main" onclick="iniciarFlu()" style="margin-top: 15px;">REPETIR</button>
    </div>
  `;
  document.getElementById('fluResultado').style.display = '';
  toast('✅ ' + total + ' palavras!');
}

// ===== LEITURA =====
function iniciarLer() {
  try {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) { toast('Navegador incompatível'); return; }
    
    let secs = 90;
    let palavras = 0;
    
    document.getElementById('lerBtn').textContent = 'PARAR';
    document.getElementById('lerStatus').style.display = '';
    document.getElementById('lerResultado').style.display = 'none';
    document.getElementById('lerPals').textContent = '0';
    
    const timer = setInterval(() => {
      secs--;
      const m = Math.floor(secs / 60);
      const s = secs % 60;
      document.getElementById('lerTempo').textContent = m + ':' + (s < 10 ? '0' : '') + s;
      if (secs <= 0) {
        clearInterval(timer);
        finalizarLer();
      }
    }, 1000);
    
    window.lerTimer = timer;
    
    const rec = new SR();
    rec.lang = 'pt-BR';
    rec.continuous = true;
    
    rec.onresult = (e) => {
      for (let i = e.resultIndex; i < e.results.length; i++) {
        if (e.results[i].isFinal) {
          const pals = e.results[i][0].transcript.split(/\s+/).length;
          palavras += pals;
          document.getElementById('lerPals').textContent = palavras;
        }
      }
    };
    
    rec.onend = () => { if (secs > 0) rec.start(); };
    
    window.lerRec = rec;
    rec.start();
    toast('Comece a ler!');
  } catch (e) {
    toast('Erro: ' + e.message);
  }
}

function finalizarLer() {
  if (window.lerRec) window.lerRec.stop();
  if (window.lerTimer) clearInterval(window.lerTimer);
  
  document.getElementById('lerBtn').textContent = 'COMEÇAR';
  document.getElementById('lerStatus').style.display = 'none';
  
  const palavras = parseInt(document.getElementById('lerPals').textContent);
  const ppm = Math.round((palavras / 90) * 60);
  const nota = ppm >= 100 ? 'S' : ppm >= 90 ? 'A' : ppm >= 80 ? 'B' : ppm >= 60 ? 'C' : 'D';
  
  document.getElementById('lerResultado').innerHTML = `
    <div class="resultado">
      <div style="font-size: 2rem; font-weight: 900;">${ppm}</div>
      <div style="font-size: 1rem; margin: 10px 0;">PALAVRAS/MIN</div>
      <div style="font-size: 1.5rem; margin: 10px 0;">NOTA: ${nota}</div>
      <div style="font-size: .9rem;">Total: ${palavras} palavras</div>
      <button class="btn btn-main" onclick="iniciarLer()" style="margin-top: 15px;">REPETIR</button>
    </div>
  `;
  document.getElementById('lerResultado').style.display = '';
  toast('✅ ' + ppm + ' pal/min!');
}

// Init
atualizarTextoLeitura();
</script>
