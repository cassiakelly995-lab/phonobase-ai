<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FonoPRO</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html{font-size:16px}
body{background:#f5f2ec;color:#18120a;font-family:system-ui,sans-serif;padding:20px}
.container{max-width:700px;margin:0 auto}
h1{margin-bottom:20px;text-align:center}
.buttons{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap}
.btn{padding:12px 20px;border:none;cursor:pointer;border-radius:8px;font-weight:700;font-size:1rem;min-height:50px}
.btn-main{background:#18120a;color:#fff}
.btn-main:hover{background:#0d0804}
.btn-sec{background:#e8f2ff;border:2px solid #0066bb;color:#0066bb}
.panel{background:#fffef9;border:2px solid #ddd;border-radius:10px;padding:20px;margin-bottom:20px}
.select{width:100%;padding:12px;font-size:1rem;border:2px solid #ddd;border-radius:8px;margin-bottom:10px;font-family:inherit}
.text-display{background:#f5f2ec;padding:15px;border-radius:8px;font-size:1.1rem;line-height:1.8;margin:15px 0;min-height:100px}
.timer{font-family:monospace;font-size:3rem;font-weight:900;text-align:center;margin:20px 0}
.words-display{background:#f5f2ec;padding:15px;border-radius:8px;min-height:80px;display:flex;flex-wrap:wrap;gap:10px}
.word-chip{background:#e8f7ea;border:2px solid #2a7a38;color:#2a7a38;padding:8px 12px;border-radius:8px;font-weight:600}
.result{background:#e8f7ea;border:2px solid #2a7a38;padding:20px;border-radius:8px;text-align:center;font-size:1.3rem;font-weight:700}
.result.bad{background:#fdecea;border-color:#c0392b;color:#c0392b}
#toast{position:fixed;bottom:20px;left:20px;background:#18120a;color:#fff;padding:15px 20px;border-radius:8px;font-size:1.1rem;min-width:200px;z-index:999}
@media(max-width:600px){html{font-size:14px}.buttons{flex-direction:column}.btn{width:100%}input{font-size:16px!important;padding:12px!important}}
</style>
</head>
<body>

<div class="container">
  <h1>🎙️ FonoPRO</h1>
  
  <div class="buttons">
    <button class="btn btn-main" onclick="mostrarStop()">🎲 STOP</button>
    <button class="btn btn-main" onclick="mostrarFlu()">💬 FLUÊNCIA</button>
    <button class="btn btn-main" onclick="mostrarLer()">📖 LEITURA</button>
  </div>

  <!-- STOP -->
  <div id="stopPanel" class="panel" style="display:none">
    <h2>🎲 STOP</h2>
    <p>Preencha as categorias com a letra sorteada!</p>
    
    <label>Dificuldade:</label>
    <select id="stopDif" onchange="atualizarStopCats()">
      <option value="1">🟢 Fácil - 5 categorias</option>
      <option value="2">🟡 Médio - 8 categorias</option>
      <option value="3">🔴 Difícil - 12 categorias</option>
      <option value="4">⚫ Extremo - 15 categorias</option>
    </select>
    
    <label>Tempo:</label>
    <select id="stopTempo">
      <option value="60">1 minuto</option>
      <option value="90" selected>1:30</option>
      <option value="120">2 minutos</option>
      <option value="0">Sem tempo</option>
    </select>
    
    <button class="btn btn-main" onclick="comecaStop()" style="width:100%;margin-top:10px">COMEÇAR</button>
    
    <div id="stopGame" style="display:none;margin-top:20px">
      <div style="text-align:center">
        <div style="font-size:0.9rem;color:#666">LETRA</div>
        <div style="font-family:Georgia,serif;font-size:5rem;font-weight:900" id="stopLetra">A</div>
        <div class="timer" id="stopTimer">1:30</div>
      </div>
      
      <div id="stopForm"></div>
      
      <button class="btn btn-main" onclick="terminaStop()" style="width:100%;background:#c0392b;margin-top:20px">PARAR</button>
    </div>
    
    <div id="stopResult" style="display:none;margin-top:20px"></div>
  </div>

  <!-- FLUÊNCIA -->
  <div id="fluPanel" class="panel" style="display:none">
    <h2>💬 FLUÊNCIA</h2>
    <p>Fale palavras diferentes da categoria!</p>
    
    <label>Dificuldade:</label>
    <select id="fluDif">
      <option value="1">🟢 Fácil</option>
      <option value="2">🟡 Médio</option>
      <option value="3">🔴 Difícil</option>
      <option value="4">⚫ Extremo</option>
    </select>
    
    <label>Categoria:</label>
    <select id="fluCat">
      <option value="0">Animais</option>
      <option value="1">Frutas</option>
      <option value="2">Cores</option>
      <option value="3">Países</option>
      <option value="4">Cidades</option>
      <option value="5">Profissões</option>
    </select>
    
    <button class="btn btn-main" id="fluBtn" onclick="comecaFlu()" style="width:100%;margin-top:10px">COMEÇAR</button>
    
    <div class="timer" id="fluTimer" style="display:none">1:00</div>
    
    <div id="fluWords" class="words-display"></div>
    
    <div id="fluResult" style="display:none;margin-top:20px"></div>
  </div>

  <!-- LEITURA -->
  <div id="lerPanel" class="panel" style="display:none">
    <h2>📖 LEITURA</h2>
    <p>Leia em voz alta!</p>
    
    <label>Nível:</label>
    <select id="lerNivel">
      <option value="1">🟢 Nível 1 - Fácil</option>
      <option value="2">🟡 Nível 2 - Normal</option>
      <option value="3">🟠 Nível 3 - Médio</option>
      <option value="4">🔴 Nível 4 - Difícil</option>
      <option value="5">⚫ Nível 5 - Extremo</option>
      <option value="6">🌪️ Nível 6 - Ultra</option>
      <option value="7">💀 Nível 7 - Insano</option>
      <option value="8">🌀 Nível 8 - Caótico</option>
    </select>
    
    <div id="lerTexto" class="text-display"></div>
    
    <button class="btn btn-main" id="lerBtn" onclick="comecaLer()" style="width:100%">COMEÇAR</button>
    
    <div id="lerStatus" style="display:none;margin-top:10px;font-size:1rem">
      Tempo: <strong id="lerTempo">0:00</strong> | Palavras: <strong id="lerPalavras">0</strong>
    </div>
    
    <div id="lerResult" style="display:none;margin-top:20px"></div>
  </div>
</div>

<div id="toast"></div>

// FUNÇÕES
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.display = 'block';
  setTimeout(() => { t.style.display = 'none'; }, 2500);
}

  document.getElementById('stopPanel').style.display = '';

  atualizarStopCats();
}

}

function comecaStop() {
  const dif = document.getElementById('stopDif').value;
  const dados = STOP_DADOS[dif];
  const ltrs = 'ABCDEFGIJLMNOPQRSTUVXZ';
  const letra = ltrs[Math.floor(Math.random() * ltrs.length)];
  
  let tempo = parseInt(document.getElementById('stopTempo').value);
  let secs = tempo;
  
  document.getElementById('stopLetra').textContent = letra;
  document.getElementById('stopGame').style.display = '';
  document.getElementById('stopResult').style.display = 'none';
  
  const form = document.getElementById('stopForm');
  form.innerHTML = dados.cats.map((cat, i) => `
    <div style="margin-bottom:12px">
      <label style="font-weight:600;margin-bottom:5px;display:block">${cat}:</label>
      <input type="text" placeholder="Com ${letra}..." data-cat="${cat.toLowerCase()}" style="width:100%;padding:10px;border:2px solid #ddd;border-radius:6px;font-size:1rem;font-family:inherit">
    </div>
  `).join('');
  
  const timer = setInterval(() => {
    secs--;
    const m = Math.floor(secs / 60);
    const s = secs % 60;
    document.getElementById('stopTimer').textContent = m + ':' + (s < 10 ? '0' : '') + s;
    if (secs <= 0) {
      clearInterval(timer);
      terminaStop();
    }
  }, 1000);
  
  window.stopTimer = timer;
}

    const cat = inp.getAttribute('data-cat');
    const val = inp.value.toLowerCase().trim();
    const ok = val.startsWith(letra) && dados.pals[cat] && dados.pals[cat].includes(val);
    pts += ok ? 10 : 0;
    html += `<div style="margin:10px 0;padding:10px;border-radius:6px;background:${ok ? '#e8f7ea' : '#fdecea'};border:2px solid ${ok ? '#2a7a38' : '#c0392b'}">
      ${ok ? '✅' : '❌'} <strong>${cat.toUpperCase()}</strong>: ${val || '(vazio)'}
    </div>`;
  });
  
  const max = dados.cats.length * 10;
  const pct = Math.round((pts / max) * 100);
  document.getElementById('stopResult').innerHTML = `
    <div class="result">
      <div>${pts}/${max} PONTOS</div>
      <div style="font-size:2rem;margin:10px 0">${pct}%</div>
      ${html}
      <button class="btn btn-main" onclick="comecaStop()" style="width:100%;margin-top:10px">TENTAR NOVAMENTE</button>
    </div>
  `;
  document.getElementById('stopResult').style.display = '';
  toast('✅ ' + pts + ' pontos!');
}

function comecaFlu() {
  try {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) throw new Error('Navegador incompatível');
    
    const dif = document.getElementById('fluDif').value;
    const cat = parseInt(document.getElementById('fluCat').value);
    const palavrasEsperadas = FLU_DADOS[dif][cat];
    
    let secs = 60;
    let palavrasFaladas = [];
    
    document.getElementById('fluBtn').textContent = 'PARAR';
    document.getElementById('fluTimer').style.display = '';
    document.getElementById('fluWords').innerHTML = '';
    document.getElementById('fluResult').style.display = 'none';
    
    const timer = setInterval(() => {
      secs--;
      document.getElementById('fluTimer').textContent = Math.floor(secs / 60) + ':' + (secs % 60 < 10 ? '0' : '') + (secs % 60);
      if (secs <= 0) {
        clearInterval(timer);
        terminaFlu();
      }
    }, 1000);
    
    window.fluTimer = timer;
    
    const rec = new SR();
    rec.lang = 'pt-BR';
    rec.continuous = true;
    
    rec.onresult = (e) => {
      for (let i = e.resultIndex; i < e.results.length; i++) {
        if (e.results[i].isFinal) {
          const pals = e.results[i][0].transcript.toLowerCase().split(/\s+/);
          pals.forEach(p => {
            if (p.length > 2 && !palavrasFaladas.includes(p)) {
              palavrasFaladas.push(p);
              const chip = document.createElement('span');
              chip.className = 'word-chip';
              chip.textContent = '✓ ' + p;
              document.getElementById('fluWords').appendChild(chip);
            }
          });
        }
      }
    };
    
    rec.onend = () => { if (secs > 0) rec.start(); };
    
    window.fluRec = rec;
    rec.start();
    toast('Fale agora!');
  } catch (e) {
    toast('❌ Erro: ' + e.message);
  }
}

function terminaFlu() {
  if (window.fluRec) window.fluRec.stop();
  if (window.fluTimer) clearInterval(window.fluTimer);
  
  document.getElementById('fluBtn').textContent = 'COMEÇAR';
  document.getElementById('fluTimer').style.display = 'none';
  
  const total = document.querySelectorAll('#fluWords .word-chip').length;
  document.getElementById('fluResult').innerHTML = `
    <div class="result" style="font-size:1.5rem">
      <div>${total}</div>
      <div style="font-size:1rem;margin-top:10px">PALAVRAS DIFERENTES</div>
      <button class="btn btn-main" onclick="comecaFlu()" style="width:100%;margin-top:10px">REPETIR</button>
    </div>
  `;
  document.getElementById('fluResult').style.display = '';
  toast('✅ ' + total + ' palavras!');
}

function comecaLer() {
  try {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) throw new Error('Navegador incompatível');
    
    let secs = 90;
    let palavras = 0;
    
    document.getElementById('lerBtn').textContent = 'PARAR';
    document.getElementById('lerStatus').style.display = '';
    document.getElementById('lerResult').style.display = 'none';
    
    const timer = setInterval(() => {
      secs--;
      const m = Math.floor(secs / 60);
      const s = secs % 60;
      document.getElementById('lerTempo').textContent = m + ':' + (s < 10 ? '0' : '') + s;
      if (secs <= 0) {
        clearInterval(timer);
        terminaLer();
      }
    }, 1000);
    
    window.lerTimer = timer;
    
    const rec = new SR();
    rec.lang = 'pt-BR';
    rec.continuous = true;
    
    rec.onresult = (e) => {
      for (let i = e.resultIndex; i < e.results.length; i++) {
        if (e.results[i].isFinal) {
          const pals = e.results[i][0].transcript.split(/\s+/).length;
          palavras += pals;
          document.getElementById('lerPalavras').textContent = palavras;
        }
      }
    };
    
    rec.onend = () => { if (secs > 0) rec.start(); };
    
    window.lerRec = rec;
    rec.start();
    toast('Comece a ler!');
  } catch (e) {
    toast('❌ Erro: ' + e.message);
  }
}

function terminaLer() {
  if (window.lerRec) window.lerRec.stop();
  if (window.lerTimer) clearInterval(window.lerTimer);
  
  document.getElementById('lerBtn').textContent = 'COMEÇAR';
  document.getElementById('lerStatus').style.display = 'none';
  
  const palavras = parseInt(document.getElementById('lerPalavras').textContent);
  const ppm = Math.round((palavras / 90) * 60);
  const nota = ppm >= 100 ? 'S' : ppm >= 90 ? 'A' : ppm >= 80 ? 'B' : 'C';
  
  document.getElementById('lerResult').innerHTML = `
    <div class="result">
      <div>${ppm}</div>
      <div style="font-size:1rem;margin:10px 0">PALAVRAS POR MINUTO</div>
      <div style="font-size:1.5rem;margin:10px 0">NOTA: ${nota}</div>
      <div style="font-size:0.9rem">Total: ${palavras} palavras</div>
      <button class="btn btn-main" onclick="comecaLer()" style="width:100%;margin-top:10px">REPETIR</button>
    </div>
  `;
  document.getElementById('lerResult').style.display = '';
  toast('✅ ' + ppm + ' pal/min!');
}
