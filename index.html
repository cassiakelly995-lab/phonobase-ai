<!DOCTYPE html>
<html lang="pt-BR">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>FonoPRO Avançado</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#f5f2ec;--paper:#fffef9;--ink:#18120a;--ink2:#4a3f30;--blue:#0066bb;--blue-bg:#e8f2ff;--green:#2a7a38;--green-bg:#e8f7ea;--red:#c0392b;--red-bg:#fdecea}
html{font-size:16px}body{background:var(--bg);color:var(--ink);font-family:system-ui,sans-serif}
.top{background:var(--paper);border-bottom:2px solid var(--ink);padding:12px 18px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100}
.brand{font-size:1.1rem;font-weight:700;margin-right:auto}
.nav{display:flex;gap:8px}
.btn{padding:8px 14px;border-radius:6px;border:none;cursor:pointer;font-weight:600;font-size:.85rem;min-height:44px;font-family:inherit}
.btn-nav{background:transparent;border:1px solid #ccc}.btn-nav.active{background:var(--ink);color:#fff}
.btn-main{background:var(--ink);color:#fff;border:none;width:100%}
.btn-recording{background:var(--red);color:#fff;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
.wrap{max-width:700px;margin:0 auto;padding:20px 16px 80px}
.page{display:none}.page.active{display:block}
.panel{background:var(--paper);border:1.5px solid #ddd;border-radius:10px;padding:16px;margin-bottom:14px}
.dica{background:var(--blue-bg);border-left:3px solid var(--blue);padding:10px 12px;border-radius:0 6px 6px 0;font-size:.8rem;margin-bottom:12px}
.texto{background:var(--bg);border:1px solid #ddd;border-radius:8px;padding:12px;margin:12px 0;min-height:100px;line-height:1.6;font-size:.95rem}
.grid{display:grid;gap:8px;margin:10px 0}
.grid-btn{background:transparent;border:1px solid #ddd;padding:8px;cursor:pointer;font-size:.8rem;font-weight:600;border-radius:6px;font-family:inherit;min-height:44px}
.grid-btn.on{background:var(--ink);color:#fff;border-color:var(--ink)}
.palavra-card{background:var(--bg);border:2px solid var(--blue);border-radius:8px;padding:12px;margin:8px 0;font-size:.9rem;line-height:1.6;position:relative}
.palavra-card.correto{border-color:var(--green);background:var(--green-bg)}
.palavra-card.errado{border-color:var(--red);background:var(--red-bg)}
.palavra-card.pendente{border-color:#ffb800;background:#fffbf0}
.feedback{font-size:1.2rem;font-weight:700;margin:8px 0}
.status-bar{display:flex;align-items:center;gap:10px;padding:12px;background:var(--bg);border-radius:8px;margin:12px 0;font-size:.85rem}
.mic-icon{font-size:1.5rem;animation:micpulse 1s infinite}
@keyframes micpulse{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}
.timer{font-family:monospace;font-size:2rem;font-weight:900;text-align:center;margin:12px 0}
.score{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:10px 0}
.score-item{background:var(--green-bg);border:1px solid var(--green);padding:12px;border-radius:8px;text-align:center}
.score-item.bad{background:var(--red-bg);border-color:var(--red)}
.score-item.warning{background:#fff3cd;border-color:#ffb800}
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(100px);background:var(--ink);color:#fff;padding:12px 16px;border-radius:6px;z-index:999;transition:transform .3s;max-width:90%}
#toast.show{transform:translateX(-50%) translateY(0)}
.canvas{width:100%;height:100px;background:var(--bg);border-radius:8px;margin:12px 0}
@media(max-width:600px){html{font-size:14px}.grid{grid-template-columns:1fr}input{font-size:16px!important;padding:12px!important}}
</style>
</head>
<body>

<div class="top">
  <div class="brand">FonoPRO Avançado</div>
  <div class="nav">
    <button class="btn btn-nav active" onclick="go('falar')">🎙️ Falar</button>
    <button class="btn btn-nav" onclick="go('leitura')">📖 Leitura</button>
  </div>
</div>

<div class="wrap">

<!-- FALAR COM FEEDBACK -->
<div class="page active" id="page-falar">
  <div class="panel">
    <h2>🎙️ Fale Sem Errar</h2>
    <p style="font-size:.9rem;color:#666;margin:8px 0">O sistema reconhece em TEMPO REAL cada palavra!</p>
    
    <label style="font-weight:700;display:block;margin-bottom:8px">Escolha Dificuldade:</label>
    <div class="grid" style="grid-template-columns:repeat(3,1fr);margin-bottom:14px">
      <button class="grid-btn on" id="dif1" onclick="setDif(1)">🟢 Fácil</button>
      <button class="grid-btn" id="dif2" onclick="setDif(2)">🟡 Médio</button>
      <button class="grid-btn" id="dif3" onclick="setDif(3)">🔴 Difícil</button>
    </div>
    
    <div id="palavrasDisplay" style="min-height:150px;max-height:200px;overflow-y:auto"></div>
    
    <div class="status-bar" id="statusBar" style="display:none">
      <span class="mic-icon">🎙️</span>
      <span id="statusTxt">Ouvindo...</span>
    </div>
    
    <button class="btn btn-main" id="falarBtn" onclick="toggleFalar()" style="padding:12px">▶ COMEÇAR A FALAR</button>
    
    <div id="transcriptDisplay" style="background:var(--bg);border:1px solid #ddd;border-radius:8px;padding:12px;margin:12px 0;min-height:80px;font-size:.9rem;display:none" id="transcriptBox"></div>
    
    <div id="resultadoFalar" style="display:none;margin-top:12px"></div>
  </div>
</div>

<!-- LEITURA AVANÇADA -->
<div class="page" id="page-leitura">
  <div class="panel">
    <h2>📖 Leitura com Pronúncia</h2>
    <p style="font-size:.9rem;color:#666;margin:8px 0">Leia as palavras com pronúncia correta!</p>
    
    <label style="font-weight:700;display:block;margin-bottom:8px">Nível:</label>
    <div class="grid" style="grid-template-columns:repeat(5,1fr);margin-bottom:14px">
      <button class="grid-btn on" id="lvl1" onclick="setLevel(1)">1</button>
      <button class="grid-btn" id="lvl2" onclick="setLevel(2)">2</button>
      <button class="grid-btn" id="lvl3" onclick="setLevel(3)">3</button>
      <button class="grid-btn" id="lvl4" onclick="setLevel(4)">4</button>
      <button class="grid-btn" id="lvl5" onclick="setLevel(5)">5</button>
    </div>
    
    <div id="leituraPalavras" class="texto"></div>
    
    <button class="btn btn-main" id="leituraBtn" onclick="toggleLeitura()" style="padding:12px;margin-bottom:10px">▶ COMEÇAR LEITURA</button>
    
    <div class="score" id="scoreBox" style="display:none">
      <div class="score-item">
        <div style="font-size:.75rem;color:#666">Corretas</div>
        <div style="font-size:1.4rem;font-weight:900" id="scoreCert">0</div>
      </div>
      <div class="score-item warning">
        <div style="font-size:.75rem;color:#666">Parciais</div>
        <div style="font-size:1.4rem;font-weight:900" id="scorePar">0</div>
      </div>
      <div class="score-item bad">
        <div style="font-size:.75rem;color:#666">Erradas</div>
        <div style="font-size:1.4rem;font-weight:900" id="scoreErr">0</div>
      </div>
    </div>
    
    <div id="resultadoLeitura" style="display:none;margin-top:12px"></div>
  </div>
</div>

</div>

<div id="toast"></div>

<script>
// CONFIGURAÇÃO GLOBAL
const PALAVRAS_POR_NIVEL={
  1:['gato','cão','casa','pão','água','sol','lua','porta','mesa','cama','pato','rato','bola','cota'],
  2:['maçã','banana','laranja','melancia','morango','livro','escola','árvore','pessoa','hospital','carro','bicicleta','borboleta'],
  3:['abacaxi','refrigerante','computador','telescópio','pneumático','psicólogo','psicografia','onomatopeia','eloquência','experiência','extraordinário','exuberante','exasperação']
};

const TEXTOS_LEITURA={
  1:'gato cão rato casa pão água',
  2:'João acordou cedo. Maria foi à escola. A casa é bonita.',
  3:'A aquisição fonológica demonstra desenvolvimento linguístico progressivo em crianças.',
  4:'Nas profundezas da consciência fenomenológica desdobra-se o transcendental emaranhado.',
  5:'Synchroclasmata verti-inversivas omnipotencialidade semântica quasiconsciência flogística.'
};

let difAtual=1,levelAtual=1,ativo=false,rec=null,palavrasAlvo=[],transcricaoAtual='',palavrasFaladas=[];

function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}
function speak(t){try{window.speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(t);u.lang='pt-BR';u.rate=0.9;window.speechSynthesis.speak(u);}catch(e){}}

// CALCULAR SIMILARIDADE ENTRE PALAVRAS (Levenshtein Distance)
function calcularSimilaridade(a,b){
  const m=a.length,n=b.length;
  const dp=Array(m+1).fill(null).map(()=>Array(n+1).fill(0));
  for(let i=0;i<=m;i++)dp[i][0]=i;
  for(let j=0;j<=n;j++)dp[0][j]=j;
  for(let i=1;i<=m;i++){
    for(let j=1;j<=n;j++){
      if(a[i-1]===b[j-1])dp[i][j]=dp[i-1][j-1];
      else dp[i][j]=1+Math.min(dp[i-1][j],dp[i][j-1],dp[i-1][j-1]);
    }
  }
  return dp[m][n];
}

function verificarPalavra(falada,esperada){
  const dist=calcularSimilaridade(falada.toLowerCase(),esperada.toLowerCase());
  const tamanho=Math.max(falada.length,esperada.length);
  const acuracia=Math.max(0,100-((dist/tamanho)*100));
  if(acuracia>=95)return 'correto';
  else if(acuracia>=70)return 'parcial';
  else return 'errado';
}

// FALAR COM FEEDBACK
function go(p){document.querySelectorAll('.page').forEach(x=>x.classList.remove('active'));document.getElementById('page-'+p).classList.add('active');document.querySelectorAll('.btn-nav').forEach(b=>b.classList.remove('active'));event.target.classList.add('active');}

function setDif(d){
  difAtual=d;
  document.querySelectorAll('[id^="dif"]').forEach(b=>b.classList.remove('on'));
  document.getElementById('dif'+d).classList.add('on');
  palavrasAlvo=PALAVRAS_POR_NIVEL[d];
  renderizarPalavras();
}

function renderizarPalavras(){
  const html=palavrasAlvo.map((p,i)=>{
    const falada=palavrasAlvo[i] in {...Object.fromEntries(palavrasAlvo.map((x,j)=>[j,x]))};
    let classe='pendente',check='';
    if(palavrasAlvo.includes(p)){
      if(palavrasAlvo[i]===p){classe='correto';check='✅';}
      else if(verificarPalavra(palavrasAlvo[i],p)!=='errado'){classe='parcial';check='⚠️';}
    }
    return `<div class="palavra-card ${classe}">${check} <strong>${p}</strong></div>`;
  }).join('');
  document.getElementById('palavrasDisplay').innerHTML=html;
}

function toggleFalar(){
  if(ativo)pararFalar();
  else comecaFalar();
}

function comecaFalar(){
  try{
    const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    if(!SR)throw new Error('Navegador incompatível');
    ativo=true;
    palavrasAlvo=PALAVRAS_POR_NIVEL[difAtual];
    palavrasFaladas=[];
    document.getElementById('statusBar').style.display='flex';
    document.getElementById('falarBtn').classList.add('btn-recording');
    document.getElementById('falarBtn').textContent='⏹ PARAR';
    document.getElementById('resultadoFalar').style.display='none';
    document.getElementById('transcriptDisplay').style.display='';
    document.getElementById('transcriptDisplay').innerHTML='';
    
    rec=new SR();
    rec.lang='pt-BR';
    rec.continuous=true;
    rec.interimResults=true;
    
    rec.onstart=()=>{document.getElementById('statusTxt').textContent='🎙️ Ouvindo...';}
    
    rec.onresult=(e)=>{
      let interim='';
      for(let i=e.resultIndex;i<e.results.length;i++){
        const transcript=e.results[i][0].transcript.trim().toLowerCase();
        if(e.results[i].isFinal){
          const palavras=transcript.split(/\s+/);
          palavras.forEach(p=>{
            if(p.length>2&&!palavrasFaladas.includes(p)){
              const status=verificarPalavra(p,palavrasAlvo.find(x=>x.includes(p[0]))||'');
              const html=`<div class="palavra-card ${status}">${status==='correto'?'✅':status==='parcial'?'⚠️':'❌'} ${p}</div>`;
              document.getElementById('transcriptDisplay').innerHTML+=html;
              palavrasFaladas.push({palavra:p,status:status});
              if(status==='correto')toast('✅ '+p);
              else if(status==='parcial')toast('⚠️ '+p);
              else toast('❌ '+p);
            }
          });
        }else{
          interim+=transcript+' ';
        }
      }
      if(interim)document.getElementById('statusTxt').textContent='Você disse: '+interim;
    };
    
    rec.onerror=(e)=>{console.error('Erro:',e.error);};
    rec.onend=()=>{if(ativo)setTimeout(()=>rec.start(),300);};
    
    toast('🎙️ Fale as palavras agora!');
    rec.start();
  }catch(e){toast('❌ '+e.message);}
}

function pararFalar(){
  ativo=false;
  if(rec)rec.stop();
  document.getElementById('statusBar').style.display='none';
  document.getElementById('falarBtn').classList.remove('btn-recording');
  document.getElementById('falarBtn').textContent='▶ COMEÇAR A FALAR';
  
  const certas=palavrasFaladas.filter(p=>p.status==='correto').length;
  const parciais=palavrasFaladas.filter(p=>p.status==='parcial').length;
  const erradas=palavrasFaladas.filter(p=>p.status==='errado').length;
  const taxa=Math.round((certas/(certas+parciais+erradas))*100);
  
  const html=`<div style="background:var(--green-bg);border:1px solid var(--green);padding:12px;border-radius:8px">
    <div style="text-align:center;margin-bottom:10px">
      <div style="font-size:1.4rem;font-weight:900;color:var(--green)">${taxa}%</div>
      <div style="font-size:.85rem">Taxa de Acurácia</div>
    </div>
    <div style="font-size:.85rem;margin-bottom:10px">
      ✅ <strong>${certas}</strong> corretas | ⚠️ <strong>${parciais}</strong> parciais | ❌ <strong>${erradas}</strong> erradas
    </div>
    <button class="btn btn-main" onclick="comecaFalar()" style="padding:10px;margin-top:10px">🔄 Tentar Novamente</button>
  </div>`;
  document.getElementById('resultadoFalar').innerHTML=html;
  document.getElementById('resultadoFalar').style.display='';
  toast('✅ Resultado: '+taxa+'%');
}

// LEITURA AVANÇADA
function setLevel(l){
  levelAtual=l;
  document.querySelectorAll('[id^="lvl"]').forEach(b=>b.classList.remove('on'));
  document.getElementById('lvl'+l).classList.add('on');
  document.getElementById('leituraPalavras').textContent=TEXTOS_LEITURA[l];
}

function toggleLeitura(){
  if(ativo)pararLeitura();
  else comecaLeitura();
}

function comecaLeitura(){
  try{
    const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    if(!SR)throw new Error('Incompatível');
    ativo=true;
    const texto=TEXTOS_LEITURA[levelAtual];
    const palavrasEsperadas=texto.toLowerCase().split(/\s+/);
    let palavrasCapturadas=[];
    
    document.getElementById('leituraBtn').classList.add('btn-recording');
    document.getElementById('leituraBtn').textContent='⏹ PARAR';
    document.getElementById('scoreBox').style.display='grid';
    document.getElementById('resultadoLeitura').style.display='none';
    
    rec=new SR();
    rec.lang='pt-BR';
    rec.continuous=true;
    rec.interimResults=false;
    
    rec.onresult=(e)=>{
      for(let i=e.resultIndex;i<e.results.length;i++){
        if(e.results[i].isFinal){
          const palavras=e.results[i][0].transcript.toLowerCase().split(/\s+/);
          palavras.forEach(p=>{
            if(p.length>2){
              const melhor=palavrasEsperadas.reduce((prev,curr)=>
                calcularSimilaridade(p,prev)<calcularSimilaridade(p,curr)?prev:curr
              );
              const similaridade=100-(calcularSimilaridade(p,melhor)/Math.max(p.length,melhor.length)*100);
              if(!palavrasCapturadas.find(x=>x.palavra===p)){
                palavrasCapturadas.push({palavra:p,esperada:melhor,similaridade:similaridade});
              }
            }
          });
        }
      }
      atualizarScoreLeitura(palavrasCapturadas,palavrasEsperadas);
    };
    
    rec.onend=()=>{if(ativo)setTimeout(()=>rec.start(),300);};
    toast('Leia o texto agora!');
    rec.start();
  }catch(e){toast('Erro: '+e.message);}
}

function atualizarScoreLeitura(capturadas,esperadas){
  let certas=0,parciais=0,erradas=0;
  capturadas.forEach(c=>{
    if(c.similaridade>=95)certas++;
    else if(c.similaridade>=70)parciais++;
    else erradas++;
  });
  document.getElementById('scoreCert').textContent=certas;
  document.getElementById('scorePar').textContent=parciais;
  document.getElementById('scoreErr').textContent=erradas;
}

function pararLeitura(){
  ativo=false;
  if(rec)rec.stop();
  document.getElementById('leituraBtn').classList.remove('btn-recording');
  document.getElementById('leituraBtn').textContent='▶ COMEÇAR LEITURA';
  toast('✅ Leitura concluída!');
}

setDif(1);setLevel(1);
</script>
</body>
</html>
